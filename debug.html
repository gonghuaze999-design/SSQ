<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SSQ 诊断</title>
<style>
body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
h2 { color: #7c83fd; }
.box { background: #16213e; padding: 15px; border-radius: 8px; margin: 10px 0; white-space: pre-wrap; word-break: break-all; }
.ok { color: #4ade80; }
.err { color: #f87171; }
.warn { color: #fbbf24; }
button { background: #7c83fd; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; font-size: 14px; }
</style>
</head>
<body>
<h2>SSQ 诊断工具</h2>

<div>
<button onclick="checkToken()">1. 检查Token</button>
<button onclick="callUsers()">2. 调用 /api/admin/users</button>
<button onclick="callCheck()">3. 调用 /api/auth/check</button>
</div>

<h3>Token 状态</h3>
<div class="box" id="tokenBox">点击"检查Token"</div>

<h3>接口返回</h3>
<div class="box" id="resultBox">点击接口按钮</div>

<script>
const TOKEN_KEY = 'ssq_token_v1';

function checkToken() {
  const token = localStorage.getItem(TOKEN_KEY);
  const box = document.getElementById('tokenBox');
  if (!token) {
    box.innerHTML = '<span class="err">❌ localStorage 里没有 token\n请先在主页面登录后再来这里</span>';
  } else {
    box.innerHTML = '<span class="ok">✅ Token 存在</span>\n\nKey: ' + TOKEN_KEY + '\nValue: ' + token.substring(0, 20) + '...(长度:' + token.length + ')';
  }
}

async function callCheck() {
  const token = localStorage.getItem(TOKEN_KEY);
  const box = document.getElementById('resultBox');
  box.innerHTML = '请求中...';
  try {
    const res = await fetch('/api/auth/check', {
      headers: { 'Authorization': 'Bearer ' + (token || '') }
    });
    const text = await res.text();
    box.innerHTML = 'Status: ' + res.status + '\n\n' + text;
  } catch(e) {
    box.innerHTML = '<span class="err">请求失败: ' + e.message + '</span>';
  }
}

async function callUsers() {
  const token = localStorage.getItem(TOKEN_KEY);
  const box = document.getElementById('resultBox');
  if (!token) {
    box.innerHTML = '<span class="err">❌ 没有token，请先登录</span>';
    return;
  }
  box.innerHTML = '请求中...';
  try {
    const res = await fetch('/api/admin/users', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const text = await res.text();
    box.innerHTML = 'Status: ' + res.status + '\n\n' + text;
  } catch(e) {
    box.innerHTML = '<span class="err">请求失败: ' + e.message + '</span>';
  }
}

// 自动检查
checkToken();
</script>
</body>
</html>
