<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>SSQ 诊断</title>
<style>
body{font-family:monospace;padding:20px;background:#1a1a2e;color:#eee}
.box{background:#16213e;padding:15px;border-radius:8px;margin:10px 0;white-space:pre-wrap;word-break:break-all}
button{background:#7c83fd;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;margin:5px;font-size:14px}
</style>
</head>
<body>
<h2>SSQ 诊断工具 — 找临界值</h2>
<button onclick="testSize(500)">500字节</button>
<button onclick="testSize(1000)">1000字节</button>
<button onclick="testSize(1500)">1500字节</button>
<button onclick="testSize(2000)">2000字节</button>
<button onclick="testSize(3000)">3000字节</button>
<button onclick="testSize(4000)">4000字节</button>
<div class="box" id="result">点击按钮测试</div>
<script>
const TOKEN_KEY = 'ssq_token_v1';

async function testSize(size) {
  const token = localStorage.getItem(TOKEN_KEY);
  // 构造指定大小的body（用x填充）
  const filler = 'x'.repeat(size - 20);
  const bodyStr = JSON.stringify({ prompt: filler });
  document.getElementById('result').textContent = '请求中... body=' + bodyStr.length + '字节';
  try {
    const res = await fetch('/api/deepseek', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (token||'') },
      body: bodyStr
    });
    const text = await res.text();
    document.getElementById('result').textContent = 'body大小: ' + bodyStr.length + '字节 → Status: ' + res.status + '\n\n' + text.slice(0, 200);
  } catch(e) {
    document.getElementById('result').textContent = '异常: ' + e.message;
  }
}
</script>
</body>
</html>
