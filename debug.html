<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>SSQ 诊断</title>
<style>
body{font-family:monospace;padding:20px;background:#1a1a2e;color:#eee}
.box{background:#16213e;padding:15px;border-radius:8px;margin:10px 0;white-space:pre-wrap;word-break:break-all}
button{background:#7c83fd;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;margin:5px;font-size:14px}
</style>
</head>
<body>
<h2>SSQ 诊断工具</h2>
<p>测试同样大小的body，分别发到不同路径，看哪个路径能通过</p>
<button onclick="test('/api/deepseek', false)">长Prompt → /api/deepseek</button>
<button onclick="test('/api/gemini', false)">长Prompt → /api/gemini（伪造）</button>
<button onclick="test('/api/auth/check', true)">长Body → /api/auth/check（GET）</button>
<div class="box" id="result">点击按钮测试</div>
<script>
const TOKEN_KEY = 'ssq_token_v1';
const LONG = '测试数据行'.repeat(200) + '请生成报告';

async function test(path, isGet) {
  const token = localStorage.getItem(TOKEN_KEY);
  const bodyStr = isGet ? null : JSON.stringify({ prompt: LONG });
  document.getElementById('result').textContent = '请求中... path=' + path + ' body=' + (bodyStr?.length||0) + '字节';
  try {
    const res = await fetch(path, {
      method: isGet ? 'GET' : 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (token||'') },
      body: bodyStr
    });
    const text = await res.text();
    document.getElementById('result').textContent = 'path: ' + path + '\nStatus: ' + res.status + '\nbody大小: ' + (bodyStr?.length||0) + '字节\n\n' + text.slice(0, 300);
  } catch(e) {
    document.getElementById('result').textContent = '异常: ' + e.message;
  }
}
</script>
</body>
</html>
