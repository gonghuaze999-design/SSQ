<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SSQ 诊断</title>
<style>
body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
.box { background: #16213e; padding: 15px; border-radius: 8px; margin: 10px 0; white-space: pre-wrap; word-break: break-all; }
button { background: #7c83fd; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; font-size: 14px; }
</style>
</head>
<body>
<h2>SSQ 诊断工具</h2>
<button onclick="testShort()">短Prompt 直接传</button>
<button onclick="testLongFlat()">长Prompt 直接传（当前格式）</button>
<button onclick="testLongNested()">长Prompt 嵌套传（模仿Gemini格式）</button>
<h3>原始返回</h3>
<div class="box" id="result">点击按钮测试</div>
<script>
const TOKEN_KEY = 'ssq_token_v1';
const LONG_PROMPT = '你是一位专业的彩票数据分析师。\n以下是历史开奖数据分析：\n数据摘要：' + '测试数据行'.repeat(200) + '\n请生成一份详细的AI研判报告。';

async function call(body) {
  const token = localStorage.getItem(TOKEN_KEY);
  const bodyStr = JSON.stringify(body);
  document.getElementById('result').textContent = '请求中... body大小=' + bodyStr.length + '字节';
  try {
    const res = await fetch('/api/deepseek', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (token || '') },
      body: bodyStr
    });
    const text = await res.text();
    document.getElementById('result').textContent = 'Status: ' + res.status + '\nbody大小: ' + bodyStr.length + '字节\n\n' + text.slice(0, 300);
  } catch(e) {
    document.getElementById('result').textContent = '请求异常: ' + e.message;
  }
}

// 当前格式：prompt在顶层
function testShort() { call({ prompt: '用一句话介绍你自己' }); }
function testLongFlat() { call({ prompt: LONG_PROMPT }); }

// 嵌套格式：模仿Gemini，prompt放在嵌套结构里
function testLongNested() { call({ contents: [{ parts: [{ text: LONG_PROMPT }] }] }); }
</script>
</body>
</html>
