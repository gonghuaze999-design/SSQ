<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SSQ 诊断</title>
<style>
body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
.box { background: #16213e; padding: 15px; border-radius: 8px; margin: 10px 0; white-space: pre-wrap; word-break: break-all; }
button { background: #7c83fd; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; font-size: 14px; }
</style>
</head>
<body>
<h2>SSQ 诊断工具</h2>
<button onclick="testShort()">短Prompt（100字）</button>
<button onclick="testLong()">长Prompt（10000字）</button>
<h3>原始返回</h3>
<div class="box" id="result">点击按钮测试</div>
<script>
const TOKEN_KEY = 'ssq_token_v1';
async function call(prompt) {
  const token = localStorage.getItem(TOKEN_KEY);
  document.getElementById('result').textContent = '请求中... prompt长度=' + prompt.length + '字符';
  try {
    const res = await fetch('/api/deepseek', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (token || '') },
      body: JSON.stringify({ prompt })
    });
    const text = await res.text();
    document.getElementById('result').textContent = 'Status: ' + res.status + '\nPrompt长度: ' + prompt.length + '\n\n' + text.slice(0, 500);
  } catch(e) {
    document.getElementById('result').textContent = '请求异常: ' + e.message;
  }
}
function testShort() { call('用一句话介绍你自己'); }
function testLong() { call('你是一位专业的彩票数据分析师。\n' + '以下是历史开奖数据分析：\n' + '数据摘要：'.repeat(500) + '\n请生成一份详细的AI研判报告，包含以下章节：\n1. 数据概况\n2. 趋势分析\n3. 投注建议\n4. 风险提示\n请用中文回答，字数不少于800字。'); }
</script>
</body>
</html>
